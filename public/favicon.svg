<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Dark background, slightly rounded -->
  <rect width="100" height="100" rx="18" fill="#0a0a0b"/>
  <!-- TGL bold G lettermark — geometric/industrial style -->
  <!-- Outer arc top-left to right: thick stroke G shape built from rectangles -->
  <!-- Top bar -->
  <rect x="28" y="20" width="46" height="10" rx="2" fill="#ff5100"/>
  <!-- Left bar (full height) -->
  <rect x="20" y="20" width="10" height="60" rx="2" fill="#ff5100"/>
  <!-- Bottom bar -->
  <rect x="28" y="70" width="46" height="10" rx="2" fill="#ff5100"/>
  <!-- Middle crossbar (G's inner shelf) -->
  <rect x="50" y="50" width="24" height="10" rx="2" fill="#ff5100"/>
  <!-- Right bar (lower half only — the G's open top) -->
  <rect x="70" y="50" width="10" height="30" rx="2" fill="#ff5100"/>
</svg>
